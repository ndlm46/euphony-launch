<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Euphony Launch - Time perfect streaming to your DAC">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Euphony">
  <title>Euphony Launch</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Icons -->
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-content">
      <div class="loading-icon">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
            </linearGradient>
          </defs>
          <circle cx="32" cy="32" r="28" stroke="url(#grad1)" stroke-width="3" fill="none" opacity="0.3"/>
          <path d="M24 18 L24 46 L46 32 Z" fill="url(#grad1)" opacity="0.9"/>
        </svg>
      </div>
      <h2 class="loading-title">Euphony</h2>
      <p class="loading-subtitle">Loading devices...</p>
      <div class="loading-bar">
        <div class="loading-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-bg"></div>
      <div class="header-content">
        <div class="header-logo">
          <svg width="40" height="40" viewBox="0 0 64 64" fill="none">
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#7c3aed" />
                <stop offset="100%" style="stop-color:#3b82f6" />
              </linearGradient>
            </defs>
            <circle cx="32" cy="32" r="28" stroke="url(#logoGrad)" stroke-width="2.5" fill="none" opacity="0.5"/>
            <path d="M24 18 L24 46 L46 32 Z" fill="url(#logoGrad)"/>
          </svg>
        </div>
        <div class="header-text">
          <h1 class="header-title"><strong>euphony</strong> Launch</h1>
          <p class="header-subtitle">Time perfect streaming to your DAC</p>
        </div>
        <button id="btn-refresh" class="header-refresh" title="Refresh" onclick="loadLinks()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Device List -->
    <main class="main">
      <div class="section-label">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <span>Choose a device</span>
        <span id="link-count" class="badge"></span>
      </div>

      <div id="links-container" class="links-container">
        <!-- Links will be injected here by JS -->
      </div>

      <!-- Error State -->
      <div id="error-state" class="error-state hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p>Could not load devices</p>
        <button class="retry-btn" onclick="loadLinks()">Try Again</button>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Links open directly to your local devices</p>
    </footer>
  </div>

  <!-- Device Viewer Overlay (iframe) -->
  <div id="device-viewer" class="device-viewer hidden">
    <div class="viewer-bar">
      <button id="viewer-home" class="viewer-btn viewer-home-btn" title="Back to Home" onclick="closeViewer()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </button>
      <div class="viewer-info">
        <span id="viewer-name" class="viewer-name"></span>
        <span class="viewer-dot">·</span>
        <span id="viewer-ip" class="viewer-ip"></span>
      </div>
      <button id="viewer-refresh" class="viewer-btn" title="Refresh" onclick="refreshViewer()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
    </div>
    <iframe id="device-frame" class="viewer-frame" title="Device Content"></iframe>
  </div>

  <!-- Install PWA Banner -->
  <div id="install-banner" class="install-banner hidden">
    <div class="install-banner-content">
      <div class="install-banner-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </div>
      <div class="install-banner-text">
        <strong>Install Euphony</strong>
        <span>Add to home screen</span>
      </div>
      <button id="btn-install" class="install-btn" onclick="installPWA()">Install</button>
      <button id="btn-dismiss" class="dismiss-btn" onclick="dismissInstall()">✕</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
